const S={students:[],config:{nombre:'',direccion:'',clave:'',ciclo:'',director:'',cargo:'Director(a)'},logo:'',designStyles:{schoolName:{fontFamily:'Arial',fontSize:16,color:N,align:'center',bold:true},infoLine:{fontFamily:'Arial',fontSize:9,color:'#475569',align:'center'},studentName:{fontFamily:'Arial',fontSize:12,color:N,align:'center',bold:true},dataLabel:{fontFamily:'Arial',fontSize:7,color:'#64748b',align:'left',bold:true},dataValue:{fontFamily:'Arial',fontSize:10,color:N,align:'left',bold:true},backTitle:{fontFamily:'Arial',fontSize:9,color:'#fff',align:'center',bold:true},backField:{fontFamily:'Arial',fontSize:8,color:'#1e293b',align:'left'},directorName:{fontFamily:'Arial',fontSize:10,color:N,align:'center',bold:true},directorInfo:{fontFamily:'Arial',fontSize:8,color:'#475569',align:'center'},directorAddr:{fontFamily:'Arial',fontSize:7,color:'#64748b',align:'center'},margins:{front:{top:0,bottom:0,left:0,right:0},back:{top:0,bottom:0,left:0,right:0}},photoSize:80,qrSize:60,photoQrGap:8,photoQrAlign:'center',templateImage:'',useTemplate:false,templateFit:'contain',templateOpacity:100},editId:null,editingElement:'schoolName',marginSide:'front',activeTab:'logobg'};
let fotoAlumno='',streamActivo=null;

function load(){
    db.ref('alumnos').once('value').then(snap=>{const d=snap.val();if(d)S.students=Object.values(d);else{try{S.students=JSON.parse(localStorage.getItem('cred_st')||'[]')}catch(e){}}if(S.students.length===0)S.students=[];renderStudents();});
    db.ref('configuracion/credenciales').once('value').then(snap=>{const d=snap.val();if(d&&d.nombre)S.config=d;else{try{const c=JSON.parse(localStorage.getItem('cred_cfg'));if(c)S.config=c}catch(e){}}updateHeader();});
    db.ref('configuracion/credenciales/logo').once('value').then(snap=>{if(snap.val())S.logo=snap.val();else try{S.logo=localStorage.getItem('cred_logo')||''}catch(e){}});
    db.ref('configuracion/credenciales/designStyles').once('value').then(snap=>{if(snap.val())S.designStyles=snap.val();else try{const ds=JSON.parse(localStorage.getItem('cred_ds'));if(ds)S.designStyles=ds}catch(e){}
        const ds=S.designStyles;if(!ds.margins)ds.margins={front:{top:0,bottom:0,left:0,right:0},back:{top:0,bottom:0,left:0,right:0}};
        if(!ds.photoSize)ds.photoSize=80;if(!ds.qrSize)ds.qrSize=60;if(!ds.photoQrGap)ds.photoQrGap=8;if(!ds.photoQrAlign)ds.photoQrAlign='center';
        if(!ds.templateFit)ds.templateFit='contain';if(!ds.templateOpacity)ds.templateOpacity=100;});
    db.ref('alumnos').on('value',snap=>{const d=snap.val();if(d){S.students=Object.values(d);renderStudents();}});
}
function saveSt(){const o={};S.students.forEach(s=>o[s.id]=s);db.ref('alumnos').set(o);localStorage.setItem('cred_st',JSON.stringify(S.students));}
function saveCfg(){db.ref('configuracion/credenciales').set(S.config);localStorage.setItem('cred_cfg',JSON.stringify(S.config));}
function saveDS(){db.ref('configuracion/credenciales/designStyles').set(S.designStyles);localStorage.setItem('cred_ds',JSON.stringify(S.designStyles));}
function nav(pg){document.querySelectorAll('.nav-item').forEach(e=>e.classList.toggle('active',e.dataset.page===pg));document.querySelectorAll('.page').forEach(e=>e.classList.toggle('active',e.id==='page-'+pg));if(pg==='students')renderStudents();if(pg==='design')renderDesign();if(pg==='generate')renderGenerate();if(pg==='config')renderConfig();}
document.querySelectorAll('.nav-item').forEach(e=>e.addEventListener('click',()=>nav(e.dataset.page)));

function credCard(st,cfg,logo,w,h,side){
    const ds=S.designStyles,m=(side==='front'?ds.margins.front:ds.margins.back)||{top:0,bottom:0,left:0,right:0},sc=w/215,fs=n=>(n*sc).toFixed(1),bh=Math.round(h/20),bp=6;
    let tp=bp+4+m.top*sc;if(side==='back')tp+=Math.round((0.5*h)/8.56);
    const bpB=bp+bh+4+m.bottom*sc,lp=bp+10+m.left*sc,rp=bp+10+m.right*sc,cw=w-lp-rp,ch=h-tp-bpB;
    const stl=s=>s?`font-family:${s.fontFamily||'Arial'};font-size:${fs(s.fontSize||12)}px;color:${s.color||N};text-align:${s.align||'left'};${s.bold?'font-weight:800;':''}`:'';
    const logoEl=logo?`<img src="${logo}" style="width:${fs(36)}px;height:${fs(36)}px;border-radius:50%;object-fit:contain;border:2px solid ${N};background:white;padding:2px;position:relative;z-index:5">`:`<div style="width:${fs(36)}px;height:${fs(36)}px;border-radius:50%;background:${N};display:flex;align-items:center;justify-content:center;color:white;font-size:${fs(8)}px;font-weight:800;position:relative;z-index:5">${(cfg.clave||'ESC').slice(0,3).toUpperCase()}</div>`;
    const tplImg=ds.templateImage||'',useTpl=ds.useTemplate&&tplImg,tplFit=ds.templateFit||'contain',tplOp=(ds.templateOpacity||100)/100;
    const tplTag=useTpl?`<img src="${tplImg}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:${tplFit};opacity:${tplOp};z-index:2;border-radius:6px;pointer-events:none;">`:'';
    const sid=st?.matricula||st?.id||'—';
    const pw=ds.photoSize||80,ph=Math.round(pw*1.25),qw=ds.qrSize||60,qh=ds.qrSize||60,gap=ds.photoQrGap||8,align=ds.photoQrAlign||'center';
    const fotoEl=st?.foto?`<img src="${st.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:${fs(6)}px;">`:`<span style="font-size:${fs(36)}px;color:#cbd5e1;">👤</span>`;
    const svgFrame=useTpl?'':`<svg width="${w}" height="${h}" style="position:absolute;top:0;left:0;z-index:1"><rect width="${w}" height="${h}" fill="white"/><rect x="1.5" y="1.5" width="${w-3}" height="${h-3}" fill="none" stroke="${N}" stroke-width="1.5" rx="6"/><rect x="0" y="${h-bh}" width="${w}" height="${bh}" fill="${N}" rx="0 0 6 6"/></svg>`;
    const frontHeader=useTpl?`<div style="position:relative;z-index:5;display:flex;align-items:center;gap:${fs(6)}px;margin-bottom:${fs(4)}px;padding-bottom:${fs(3)}px;">${logoEl}<div style="flex:1;text-align:center;"><div style="${stl(ds.schoolName)}">${escH(cfg.nombre)||'NOMBRE'}</div><div style="${stl(ds.infoLine)}">CCT: ${escH(cfg.clave)||'—'} | ${escH(cfg.ciclo)||'Ciclo'}</div></div></div>`:`<div style="display:flex;align-items:center;gap:${fs(6)}px;margin-bottom:${fs(4)}px;padding-bottom:${fs(3)}px;border-bottom:2px solid ${G};">${logoEl}<div style="flex:1;text-align:center;"><div style="${stl(ds.schoolName)}">${escH(cfg.nombre)||'NOMBRE'}</div><div style="${stl(ds.infoLine)}">CCT: ${escH(cfg.clave)||'—'} | ${escH(cfg.ciclo)||'Ciclo'}</div></div></div>`;
    const front=`
        ${frontHeader}
        <div style="display:flex;align-items:center;gap:${fs(gap)}px;margin:${fs(4)}px 0;justify-content:${align==='left'?'flex-start':align==='right'?'flex-end':'center'};position:relative;z-index:5;">
            <div style="width:${fs(pw)}px;height:${fs(ph)}px;border:3px solid ${N};background:#f1f5f9;display:flex;align-items:center;justify-content:center;border-radius:${fs(6)}px;flex-shrink:0;overflow:hidden;">${fotoEl}</div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:${fs(3)}px;flex-shrink:0;"><div id="qr-${st?.id||'pv'}" style="width:${fs(qw)}px;height:${fs(qh)}px;border:2px solid ${N};border-radius:${fs(4)}px;display:flex;align-items:center;justify-content:center;background:white;"></div><div style="font-size:${fs(6)}px;font-weight:800;color:${N};padding:${fs(2)}px ${fs(5)}px;">ID: ${sid}</div></div>
        </div>
        <div style="${stl(ds.studentName)} margin:${fs(4)}px 0;text-align:center;position:relative;z-index:5;">${escH(st?.nombre||'Nombre')}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:${fs(3)}px;margin-top:${fs(3)}px;padding-top:${fs(3)}px;border-top:1.5px solid ${useTpl?'transparent':'#e2e8f0'};position:relative;z-index:5;">${[['GRADO',st?.grado?st.grado+'°':'—'],['GRUPO',st?.grupo||'—'],['TURNO',st?.turno||'—'],['VIGENCIA',st?.vigencia||'—']].map(([l,v])=>`<div style="border-left:3px solid ${N};padding:${fs(2)}px ${fs(4)}px;"><div style="${stl(ds.dataLabel)}">${l}</div><div style="${stl(ds.dataValue)}">${v}</div></div>`).join('')}</div>
        <div style="margin-top:${fs(3)}px;text-align:center;font-size:${fs(5.5)}px;color:${N};position:relative;z-index:5;"><strong>Resp:</strong> ${escH(st?.tutor||'—')}</div>`;
    const back=`<div style="background:${N};color:white;text-align:center;font-weight:800;padding:${fs(5)}px;border-radius:${fs(4)}px;margin-bottom:${fs(8)}px;font-size:${fs(ds.backTitle.fontSize||9)}px;">Información de Contacto</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:${fs(6)}px;"><div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;font-weight:800;">Domicilio</div><div style="${stl(ds.backField)}">${escH(st?.domicilio)||'—'}</div></div><div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;font-weight:800;">Tutor</div><div style="${stl(ds.backField)}">${escH(st?.tutor)||'—'}</div></div><div style="display:grid;grid-template-columns:1.1fr .9fr;gap:${fs(8)}px;"><div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};font-weight:800;">Teléfono</div><div style="${stl(ds.backField)}">${escH(st?.telefono)||'—'}</div></div><div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};font-weight:800;">Sangre</div><div style="font-size:${fs(12)}px;font-weight:900;color:#CC0000;">${escH(st?.tipoSangre)||'—'}</div></div></div><div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};font-weight:800;">Alergias</div><div style="${stl(ds.backField)}">${escH(st?.alergias)||'Ninguna'}</div></div></div>
        <div style="border-top:2px solid ${G};padding-top:${fs(5)}px;text-align:center;"><div style="${stl(ds.directorName)}">${escH(cfg.director)||'Director'}</div><div style="${stl(ds.directorInfo)} margin:${fs(2)}px 0;">${escH(cfg.cargo)||'Director(a)'}</div><div style="${stl(ds.directorAddr)}">${escH(cfg.direccion)||'Dirección'}</div></div>`;
    return`<div style="position:relative;width:${w}px;height:${h}px;border-radius:6px;overflow:hidden;">${svgFrame}${tplTag}<div style="position:absolute;top:${tp}px;left:${lp}px;width:${cw}px;height:${ch}px;z-index:2;display:flex;flex-direction:column;">${side==='front'?front:back}</div></div>`;
}

function genQR(){setTimeout(()=>{document.querySelectorAll('[id^="qr-"]').forEach(el=>{if(el.hasChildNodes())return;const id=el.id.replace('qr-','');let t='SIN_ID';if(id==='pv')t='PREVIEW';else{const s=S.students.find(s=>String(s.id)===id||String(s.matricula)===id);if(s)t=s.matricula||String(s.id);}try{new QRCode(el,{text:t,width:60,height:60,colorDark:N,colorLight:'#fff'});}catch(e){el.innerHTML='<span style="font-size:8px;">QR</span>';}});},400);}
function refPrev(){const fk={nombre:'Juan Pérez',grado:'3',grupo:'A',turno:'Matutino',vigencia:'2024-2025',domicilio:'Calle 123',tutor:'María García',telefono:'9511234567',tipoSangre:'O+',alergias:'Ninguna',id:'pv',matricula:'PREVIEW',foto:''};const fe=document.getElementById('frontPrev'),be=document.getElementById('backPrev');if(fe)fe.innerHTML=credCard(fk,S.config,S.logo,240,380,'front');if(be)be.innerHTML=credCard(fk,S.config,S.logo,240,380,'back');genQR();}
function swTab(t){S.activeTab=t;renderDesign();}
function chEl(k){S.editingElement=k;renderDesign();}
function upStyle(p,v){const noEl=['photoSize','qrSize','photoQrGap','photoQrAlign','templateFit','templateOpacity'];if(noEl.includes(p)){S.designStyles[p]=v;saveDS();refPrev();return;}if(!S.editingElement)return;if(!S.designStyles[S.editingElement])S.designStyles[S.editingElement]={};S.designStyles[S.editingElement][p]=v;saveDS();refPrev();}
function setAl(a){upStyle('align',a);}
function chMS(s){S.marginSide=s;renderDesign();}
function adjM(s,d){const t=S.marginSide==='front'?S.designStyles.margins.front:S.designStyles.margins.back;let n=(t[s]||0)+d;if(n<0)n=0;if(n>20)n=20;t[s]=n;saveDS();refPrev();renderDesign();}
function upMI(s,v){const t=S.marginSide==='front'?S.designStyles.margins.front:S.designStyles.margins.back;let n=parseInt(v);if(isNaN(n))n=0;if(n<0)n=0;if(n>20)n=20;t[s]=n;saveDS();refPrev();}
function toggleTemplate(val){S.designStyles.useTemplate=val;saveDS();refPrev();renderDesign();}
function handleTemplateFile(i){const f=i.files[0];if(!f)return;if(!f.type.startsWith('image/')){toast('Solo imágenes','err');return;}const r=new FileReader();r.onload=ev=>{S.designStyles.templateImage=ev.target.result;S.designStyles.useTemplate=true;saveDS();renderDesign();refPrev();toast('✅ Plantilla cargada');};r.readAsDataURL(f);i.value='';}
function removeTemplate(){S.designStyles.templateImage='';S.designStyles.useTemplate=false;saveDS();renderDesign();refPrev();}

function renderDesign(){
    const ds=S.designStyles,cur=ds[S.editingElement]||{},m=(S.marginSide==='front'?ds.margins.front:ds.margins.back);
    const names={schoolName:'Escuela',infoLine:'CCT/Ciclo',studentName:'Alumno',dataLabel:'Etiquetas',dataValue:'Valores',backTitle:'Título rev.',backField:'Campos rev.',directorName:'Director',directorInfo:'Cargo',directorAddr:'Dirección'};
    const tabs={
        logobg:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

            <div class="card" style="grid-column:1/-1"><div class="card-hdr"><div class="card-ttl"><span class="card-ttl-accent"></span>🎨 Plantilla (Marco)</div></div>
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">${ds.templateImage?`<img class="bg-preview" src="${ds.templateImage}" style="width:80px;height:100px;object-fit:contain;">`:'<div class="bg-preview" style="width:80px;height:100px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#94a3b8;">🖼️</div>'}<div><button class="btn btn-navy btn-sm" onclick="document.getElementById('templateInput').click()">${ds.templateImage?'Cambiar':'Subir plantilla'}</button>${ds.templateImage?'<button class="btn btn-err btn-sm" onclick="removeTemplate()">Eliminar</button>':''}</div></div>
                <div style="margin-top:8px"><label style="font-size:.75em;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${ds.useTemplate?'checked':''} onchange="toggleTemplate(this.checked)" style="width:16px;height:16px">Usar plantilla como marco</label></div>
                ${ds.useTemplate?`
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div><label style="font-size:.7em;font-weight:600;">Ajuste de plantilla</label><select onchange="upStyle('templateFit',this.value)" style="width:100%;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:12px;"><option value="contain" ${(ds.templateFit||'contain')==='contain'?'selected':''}>Contener (completa)</option><option value="cover" ${(ds.templateFit||'contain')==='cover'?'selected':''}>Cubrir (recortar)</option><option value="fill" ${(ds.templateFit||'contain')==='fill'?'selected':''}>Rellenar (deformar)</option><option value="none" ${(ds.templateFit||'contain')==='none'?'selected':''}>Original (sin ajuste)</option></select></div>
                        <div><label style="font-size:.7em;font-weight:600;">Opacidad (<span id="tplOpacityVal">${ds.templateOpacity||100}</span>%)</label><input type="range" min="10" max="100" value="${ds.templateOpacity||100}" oninput="document.getElementById('tplOpacityVal').textContent=this.value+'%';upStyle('templateOpacity',parseInt(this.value))" style="width:100%"></div>
                    </div>
                    <p style="font-size:.65em;color:var(--text-3);margin-top:6px;"><strong>Contener:</strong> Muestra toda la imagen sin recortar.<br><strong>Cubrir:</strong> Cubre todo el espacio.<br><strong>Rellenar:</strong> Estira la imagen.</p>
                </div>`:''}
            </div>
        </div>`,
        style:`<div class="card"><div class="card-hdr"><div class="card-ttl"><span class="card-ttl-accent"></span>Estilos de texto</div></div><select onchange="chEl(this.value)" style="width:100%;margin-bottom:10px">${Object.entries(names).map(([k,v])=>`<option value="${k}" ${S.editingElement===k?'selected':''}>${v}</option>`).join('')}</select><div class="inline-style-bar"><label>Fuente</label><select onchange="upStyle('fontFamily',this.value)"><option>Arial</option><option>Times New Roman</option><option>Courier New</option><option>Georgia</option></select><label>Tamaño</label><input type="number" value="${cur.fontSize||12}" min="6" max="30" style="width:50px" onchange="upStyle('fontSize',parseInt(this.value))"><label>Color</label><input type="color" value="${cur.color||N}" style="width:32px;height:28px" onchange="upStyle('color',this.value)"><label><input type="checkbox" ${cur.bold?'checked':''} onchange="upStyle('bold',this.checked)"> Negrita</label><label>Alin.</label><div class="align-btns">${['left','center','right'].map(a=>`<button class="${cur.align===a?'active':''}" onclick="setAl('${a}')">${a[0].toUpperCase()}</button>`).join('')}</div></div></div>`,
        margins:`<div class="card"><div class="card-hdr"><div class="card-ttl"><span class="card-ttl-accent"></span>Márgenes</div></div><div class="margin-side-switch"><div class="margin-side-btn ${S.marginSide==='front'?'active':''}" onclick="chMS('front')">Frente</div><div class="margin-side-btn ${S.marginSide==='back'?'active':''}" onclick="chMS('back')">Reverso</div></div>${['top','bottom','left','right'].map(s=>`<div class="margin-control"><label>${s==='top'?'Sup':s==='bottom'?'Inf':s==='left'?'Izq':'Der'}</label><button class="margin-btn" onclick="adjM('${s}',-1)">−</button><input type="number" value="${m[s]||0}" min="0" max="20" onchange="upMI('${s}',this.value)"><button class="margin-btn" onclick="adjM('${s}',1)">+</button></div>`).join('')}</div>`,
        photoqr:`<div class="card"><div class="card-hdr"><div class="card-ttl"><span class="card-ttl-accent"></span>Foto, QR e ID</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><label style="font-size:.75em;font-weight:600">📸 Foto: <strong id="lblPS">${ds.photoSize||80}px</strong></label><input type="range" min="40" max="120" value="${ds.photoSize||80}" oninput="document.getElementById('lblPS').textContent=this.value+'px';upStyle('photoSize',parseInt(this.value))" style="width:100%"></div><div><label style="font-size:.75em;font-weight:600">📱 QR: <strong id="lblQS">${ds.qrSize||60}px</strong></label><input type="range" min="30" max="90" value="${ds.qrSize||60}" oninput="document.getElementById('lblQS').textContent=this.value+'px';upStyle('qrSize',parseInt(this.value))" style="width:100%"></div></div><div style="margin-top:12px"><label style="font-size:.75em;font-weight:600">↔️ Espacio: <strong id="lblGP">${ds.photoQrGap||8}px</strong></label><input type="range" min="2" max="30" value="${ds.photoQrGap||8}" oninput="document.getElementById('lblGP').textContent=this.value+'px';upStyle('photoQrGap',parseInt(this.value))" style="width:100%"></div><div style="margin-top:12px"><label style="font-size:.75em;font-weight:600;display:block;margin-bottom:6px">📍 Alineación</label><div class="align-btns"><button class="${(ds.photoQrAlign||'center')==='left'?'active':''}" onclick="upStyle('photoQrAlign','left');renderDesign()">⬅️ Izq</button><button class="${(ds.photoQrAlign||'center')==='center'?'active':''}" onclick="upStyle('photoQrAlign','center');renderDesign()">⬆️ Centro</button><button class="${(ds.photoQrAlign||'center')==='right'?'active':''}" onclick="upStyle('photoQrAlign','right');renderDesign()">➡️ Der</button></div></div></div>`
    };
    document.getElementById('designPage').innerHTML=`<div class="pg-hdr"><div><div class="pg-ttl">Diseño</div></div></div><div class="design-tabs"><div class="design-tab ${S.activeTab==='logobg'?'active':''}" onclick="swTab('logobg')">Logo y Plantilla</div><div class="design-tab ${S.activeTab==='style'?'active':''}" onclick="swTab('style')">Estilos</div><div class="design-tab ${S.activeTab==='margins'?'active':''}" onclick="swTab('margins')">Márgenes</div><div class="design-tab ${S.activeTab==='photoqr'?'active':''}" onclick="swTab('photoqr')">Foto y QR</div></div><div id="tabContent">${tabs[S.activeTab]}</div><div class="editor-preview-area"><div><div class="cred-side-lbl">FRENTE</div><div class="design-preview-container" id="frontPrev"></div></div><div><div class="cred-side-lbl">REVERSO</div><div class="design-preview-container" id="backPrev"></div></div></div>`;
    refPrev();
}

function renderStudents(){
    const st=S.students;document.getElementById('nbStudents').textContent=st.length;
    document.getElementById('statsRow').innerHTML=`<div class="stat-c"><div class="stat-lbl">Total</div><div class="stat-val">${st.length}</div></div><div class="stat-c g"><div class="stat-lbl">Matutino</div><div class="stat-val">${st.filter(s=>s.turno==='Matutino').length}</div></div><div class="stat-c s"><div class="stat-lbl">Mixto</div><div class="stat-val">${st.filter(s=>s.turno==='Mixto').length}</div></div>`;
    document.getElementById('studentsTable').innerHTML=st.length?`<div class="tbl-wrap"><table><thead><tr><th>ID</th><th>Nombre</th><th>Grado</th><th>Grupo</th><th>Turno</th><th></th></tr></thead><tbody>${st.map(s=>`<tr><td><span class="chip chip-navy">${s.matricula||s.id}</span></td><td class="td-n">${escH(s.nombre)}</td><td><span class="badge bdg-b">${s.grado?s.grado+'°':'—'}</span></td><td><span class="badge bdg-g">${s.grupo||'—'}</span></td><td>${s.turno||'—'}</td><td class="td-acts"><button class="btn btn-gold btn-sm" onclick="openModal(${s.id})">✏️</button><button class="btn btn-err btn-sm" onclick="delStudent(${s.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>`:`<div style="text-align:center;padding:40px;color:var(--text-3)">📋 Sin alumnos</div>`;
}
function openModal(id){S.editId=id||null;document.getElementById('modalTitle').textContent=id?'Editar':'Nuevo';document.getElementById('modalTitleLarge').textContent=id?'Editar Alumno':'Nuevo Alumno';document.getElementById('modalIdPreview').textContent=id?'ID: '+id:'';const s=id?S.students.find(s=>s.id===id):{};document.getElementById('f-nombre').value=s.nombre||'';document.getElementById('f-grado').value=s.grado||'';document.getElementById('f-grupo').value=s.grupo||'';document.getElementById('f-turno').value=s.turno||'Matutino';document.getElementById('f-vigencia').value=s.vigencia||'';document.getElementById('f-domicilio').value=s.domicilio||'';document.getElementById('f-tutor').value=s.tutor||'';document.getElementById('f-telefono').value=s.telefono||'';document.getElementById('f-sangre').value=s.tipoSangre||'';document.getElementById('f-alergias').value=s.alergias||'';fotoAlumno=s.foto||'';actPrevFoto();if(!id){fotoAlumno='';actPrevFoto();}cerrarPanelCamara();document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');desactivarCamara();fotoAlumno='';actPrevFoto();}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function saveStudent(){const n=document.getElementById('f-nombre').value.trim();if(!n){toast('Nombre obligatorio','err');return;}let nid;if(S.editId){nid=S.editId;}else{const ids=S.students.map(s=>s.id).filter(id=>typeof id==='number');const mx=ids.length>0?Math.max(...ids):2024000;nid=mx+1;if(nid>2024600)nid=2024001;}const d={id:nid,matricula:String(nid),nombre:n,grado:document.getElementById('f-grado').value.trim(),grupo:document.getElementById('f-grupo').value.trim().toUpperCase(),turno:document.getElementById('f-turno').value,vigencia:document.getElementById('f-vigencia').value.trim(),domicilio:document.getElementById('f-domicilio').value.trim(),tutor:document.getElementById('f-tutor').value.trim(),telefono:document.getElementById('f-telefono').value.trim(),tipoSangre:document.getElementById('f-sangre').value,alergias:document.getElementById('f-alergias').value.trim(),foto:fotoAlumno||''};if(S.editId)S.students=S.students.map(s=>s.id===S.editId?{...s,...d}:s);else S.students.push(d);saveSt();closeModal();renderStudents();toast(`Guardado ID:${nid}`);fotoAlumno='';actPrevFoto();}
function delStudent(id){const s=S.students.find(s=>s.id===id);if(!s||!confirm(`¿Eliminar a "${s.nombre}"?`))return;S.students=S.students.filter(s=>s.id!==id);saveSt();renderStudents();toast('Eliminado','wrn');}
async function activarCamara(){const v=document.getElementById('camaraVideo');try{streamActivo=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});v.srcObject=streamActivo;v.style.display='block';document.getElementById('camaraPlaceholder').style.display='none';document.getElementById('camaraEstado').textContent='(Activa)';document.getElementById('camaraEstado').style.color='var(--ok)';document.getElementById('btnActivarCamara').style.display='none';document.getElementById('btnDesactivarCamara').style.display='inline-flex';}catch(e){toast('Error de cámara','wrn');}}
function desactivarCamara(){if(streamActivo){streamActivo.getTracks().forEach(t=>t.stop());streamActivo=null;}const v=document.getElementById('camaraVideo');v.style.display='none';v.srcObject=null;document.getElementById('camaraPlaceholder').style.display='flex';document.getElementById('camaraEstado').textContent='(Inactiva)';document.getElementById('camaraEstado').style.color='var(--err)';document.getElementById('btnActivarCamara').style.display='inline-flex';document.getElementById('btnDesactivarCamara').style.display='none';}
function toggleCamara(){const p=document.getElementById('camaraPanel');if(p.style.display==='none'){p.style.display='block';p.scrollIntoView({behavior:'smooth'});}else{cerrarPanelCamara();}}
function cerrarPanelCamara(){desactivarCamara();document.getElementById('camaraPanel').style.display='none';}
function capturarFoto(){const v=document.getElementById('camaraVideo');if(!v.srcObject){toast('Active la cámara','wrn');return;}const c=document.getElementById('camaraCanvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);fotoAlumno=c.toDataURL('image/jpeg',0.85);actPrevFoto();toast('📸 Capturada');}
function cargarFotoDesdeArchivo(i){const f=i.files[0];if(!f)return;if(!f.type.startsWith('image/')){toast('Solo imágenes','err');return;}const r=new FileReader();r.onload=e=>{fotoAlumno=e.target.result;actPrevFoto();toast('📁 Cargada');};r.readAsDataURL(f);i.value='';}
function actPrevFoto(){const aI=document.getElementById('modalAvatarIcon'),aIg=document.getElementById('modalAvatarImg'),fI=document.getElementById('fotoPreviewIcon'),fIg=document.getElementById('fotoPreviewImg');if(fotoAlumno){if(aI)aI.style.display='none';if(aIg){aIg.src=fotoAlumno;aIg.style.display='block';}if(fI)fI.style.display='none';if(fIg){fIg.src=fotoAlumno;fIg.style.display='block';}}else{if(aI)aI.style.display='block';if(aIg)aIg.style.display='none';if(fI)fI.style.display='block';if(fIg)fIg.style.display='none';}}
function renderConfig(){const c=S.config;document.getElementById('configPage').innerHTML=`<div class="pg-hdr"><div><div class="pg-ttl">Configuración</div></div></div><div class="card"><div class="card-hdr"><div class="card-ttl"><span class="card-ttl-accent"></span>Datos</div><button class="btn btn-navy btn-sm" onclick="saveConfig()">💾 Guardar</button></div><div class="compact-form"><div class="compact-field" style="min-width:200px"><label>Nombre</label><input type="text" id="c-nombre" value="${escH(c.nombre)}"></div><div class="compact-field" style="min-width:200px"><label>Dirección</label><input type="text" id="c-direccion" value="${escH(c.direccion)}"></div><div class="compact-field"><label>CCT</label><input type="text" id="c-clave" value="${escH(c.clave)}"></div><div class="compact-field"><label>Ciclo</label><input type="text" id="c-ciclo" value="${escH(c.ciclo)}"></div><div class="compact-field"><label>Director(a)</label><input type="text" id="c-director" value="${escH(c.director)}"></div><div class="compact-field"><label>Cargo</label><input type="text" id="c-cargo" value="${escH(c.cargo)}"></div></div></div><div class="card"><div class="card-hdr"><div class="card-ttl"><span class="card-ttl-accent"></span>Respaldo</div></div><div class="io-row"><button class="io-btn" onclick="doExport()">📤 Exportar</button><button class="io-btn" onclick="document.getElementById('importInput').click()">📥 Importar</button></div></div>`;}
function saveConfig(){S.config={nombre:document.getElementById('c-nombre').value.trim(),direccion:document.getElementById('c-direccion').value.trim(),clave:document.getElementById('c-clave').value.trim().toUpperCase(),ciclo:document.getElementById('c-ciclo').value.trim(),director:document.getElementById('c-director').value.trim(),cargo:document.getElementById('c-cargo').value.trim()};saveCfg();updateHeader();toast('Configuración guardada');}
function doExport(){const d={students:S.students,config:S.config,designStyles:S.designStyles,exportedAt:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`credenciales_${(S.config.clave||'esc').toLowerCase()}_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Exportado');}
function handleImportFile(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!confirm(`¿Importar?\nAlumnos:${(d.students||[]).length}`))return;if(d.students){S.students=d.students;saveSt();}if(d.config){S.config=d.config;saveCfg();}if(d.designStyles){S.designStyles=d.designStyles;saveDS();}updateHeader();renderStudents();renderDesign();toast('Importado');}catch(e){toast('Archivo no válido','err');}};r.readAsText(f);i.value='';}
function handleLogoFile(i){const f=i.files[0];if(!f)return;if(!f.type.startsWith('image/')){toast('Solo imágenes','err');return;}const r=new FileReader();r.onload=ev=>{S.logo=ev.target.result;db.ref('configuracion/credenciales/logo').set(S.logo);localStorage.setItem('cred_logo',S.logo);updateHeader();renderDesign();};r.readAsDataURL(f);i.value='';}
function removeLogo(){S.logo='';db.ref('configuracion/credenciales/logo').remove();localStorage.removeItem('cred_logo');updateHeader();renderDesign();}

function renderGenerate(){
    const selId=window._genId||'',st=selId?S.students.find(s=>s.id===parseInt(selId)):null;
    const grados=[1,2,3],grupos=['A','B','C','D','E','F','G','H','I'];
    let ops='<option value="">— Seleccionar alumno —</option>';
    grados.forEach(grado=>{ops+=`<optgroup label="📚 ${grado}° GRADO">`;grupos.forEach(grupo=>{const ag=S.students.filter(s=>s.grado==grado&&s.grupo===grupo).sort((a,b)=>a.nombre.localeCompare(b.nombre));if(ag.length>0){ops+=`<optgroup label=" └─ Grupo ${grupo} (${ag.length})">`;ag.forEach(s=>{ops+=`<option value="${s.id}" ${selId==s.id?'selected':''}>👤 ${escH(s.nombre)} — ID:${s.matricula||s.id}</option>`;});ops+='</optgroup>';}});ops+='</optgroup>';});
    document.getElementById('generatePage').innerHTML=`<div class="pg-hdr"><div><div class="pg-ttl">Generar Credencial</div></div></div><div class="gen-selector"><select onchange="window._genId=this.value;renderGenerate()" style="font-size:13px">${ops}</select>${st?`<button class="btn btn-navy" onclick="printCredential(${st.id})">🖨️ Imprimir (Carta)</button>`:''}</div>${st?`<div class="cred-prev-wrap"><div><div class="cred-side-lbl">FRENTE</div><div class="cred-frame">${credCard(st,S.config,S.logo,240,380,'front')}</div></div><div><div class="cred-side-lbl">REVERSO</div><div class="cred-frame">${credCard(st,S.config,S.logo,240,380,'back')}</div></div></div>`:`<div class="gen-no-sel">Selecciona un alumno</div>`}`;
    genQR();
}
function printCredential(id){const s=S.students.find(s=>s.id===id);if(!s){toast('No encontrado','err');return;}const fw=317,fh=446;const w=window.open('','_blank','width=1000,height=800');if(!w){toast('Permite ventanas','err');return;}w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Credencial</title><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script><style>@page{size:letter;margin:5mm}body{font-family:Arial;display:flex;gap:8mm;justify-content:center;padding:5mm}.cw{width:8.4cm;height:11.8cm}@media print{body{padding:2mm}}</style></head><body><div class="cw">${credCard(s,S.config,S.logo,fw,fh,'front')}</div><div class="cw">${credCard(s,S.config,S.logo,fw,fh,'back')}</div><script>document.querySelectorAll('[id^="qr-"]').forEach(el=>{if(!el.hasChildNodes()){try{new QRCode(el,{text:el.id.replace('qr-',''),width:60,height:60,colorDark:'#0B2D6B',colorLight:'#fff'})}catch(e){}}});setTimeout(()=>window.print(),800);<\/script></body></html>`);w.document.close();}
function escH(s){return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');}
function toast(m,t){const i={ok:'✅',err:'❌',wrn:'⚠️'};const e=document.createElement('div');e.className=`toast ${t==='err'?'err':t==='wrn'?'wrn':''}`;e.innerHTML=`<span>${i[t]||'✅'}</span><span>${escH(m)}</span><button onclick="this.parentElement.remove()">✕</button>`;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),3000);}
function updateHeader(){const e=document.getElementById('hdrLogo');if(S.logo){e.innerHTML=`<img src="${S.logo}">`;e.style.background='transparent';}else{e.innerHTML=(S.config.clave||'C').charAt(0).toUpperCase();e.style.background='var(--gold)';}document.getElementById('hdrSub').textContent=S.config.nombre||'Configura tu escuela';document.getElementById('hdrPill').textContent='v6.7';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
load();updateHeader();renderStudents();
console.log('✅ App Credenciales v6.7 - Plantilla mejorada');
</script>
</body>
</html>
