    <style>

        .ni-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: rgba(255,255,255,.08); flex-shrink: 0; }
        .ni-badge { background: var(--gold); color: var(--navy-dk); font-size: 10px; font-weight: 800; padding: 2px 10px; border-radius: 20px; }
        .sb-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,.08); text-align: center; } .sb-ver { font-size: 10px; color: rgba(255,255,255,.25); }
        #main { overflow-y: auto; overflow-x: hidden; background: var(--bg); }
        .page { display: none; padding: 28px 32px; min-height: 100%; } .page.active { display: block; animation: pgIn .25s ease; } @keyframes pgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 22px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--t); white-space: nowrap; }
        .btn-navy { background: var(--navy); color: #fff; } .btn-navy:hover { background: var(--navy-lt); }
        .btn-gold { background: var(--gold); color: #fff; } .btn-gold:hover { background: var(--gold-lt); color: var(--navy-dk); }
        .btn-out { background: transparent; color: var(--navy); border: 1.5px solid var(--border-dk); } .btn-out:hover { border-color: var(--navy); background: #F0F4FF; }
        .btn-err { background: var(--err-bg); color: var(--err); } .btn-err:hover { background: #FECACA; }
        .btn-sm { padding: 5px 14px; font-size: 12px; border-radius: 8px; }

        .card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .card-ttl { font-size: 14px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
        .card-ttl-accent { width: 4px; height: 18px; background: var(--gold); border-radius: 2px; }

        .m-body { padding: 24px; } .m-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--bg); border-radius: 0 0 18px 18px; }
        .design-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .design-tab { padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 12.5px; color: var(--text-2); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--t); user-select: none; } .design-tab:hover { color: var(--navy); } .design-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
        .editor-preview-area { display: flex; gap: 24px; align-items: flex-start; margin-top: 20px; flex-wrap: wrap; }
        .design-preview-container { width: 240px; height: 380px; border-radius: 12px; overflow: hidden; box-shadow: 0 14px 48px rgba(11,45,107,.28); background: white; }

        .inline-style-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
        .inline-style-bar label { font-size: 10.5px; } .inline-style-bar select, .inline-style-bar input[type="number"], .inline-style-bar input[type="color"] { width: auto; min-width: 60px; padding: 5px 8px; font-size: 12px; }
        .align-btns { display: flex; gap: 3px; } .align-btns button { width: 28px; height: 28px; border: 1px solid var(--border-dk); background: white; border-radius: 5px; cursor: pointer; font-weight: 600; color: var(--text-2); font-size: 11px; display: flex; align-items: center; justify-content: center; } .align-btns button.active { background: var(--navy); color: white; border-color: var(--navy); }
        .logo-preview-sm { width: 50px; height: 50px; border-radius: 8px; object-fit: contain; border: 1.5px solid var(--border); background: white; padding: 3px; }
        .bg-preview { width: 60px; height: 40px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
        .cred-prev-wrap { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; justify-content: center; }
        .margin-control { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; } .margin-control label { width: 60px; font-size: 11px; font-weight: 600; color: var(--text-2); } .margin-control input[type="number"] { width: 55px; text-align: center; }
        .margin-btn { width: 28px; height: 28px; border: 1px solid var(--border-dk); background: white; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--navy); transition: var(--t); } .margin-btn:hover { background: var(--navy); color: #fff; }
        .margin-side-switch { display: flex; gap: 2px; margin-bottom: 16px; } .margin-side-btn { padding: 6px 16px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-2); border-radius: 6px; transition: var(--t); } .margin-side-btn:first-child { border-radius: 6px 0 0 6px; } .margin-side-btn:last-child { border-radius: 0 6px 6px 0; } .margin-side-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
        .compact-form { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: flex-end; } .compact-field { display: flex; flex-direction: column; gap: 4px; min-width: 130px; flex: 1; } .compact-field label { font-size: 10.5px; font-weight: 600; color: var(--text-2); } .compact-field input, .compact-field select { font-size: 12.5px; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); color: var(--text); transition: var(--t); outline: none; width: 100%; } .compact-field input:focus, .compact-field select:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11,45,107,.1); }
        .io-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; } .io-btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--white); cursor: pointer; font-weight: 600; font-size: 13px; color: var(--navy); transition: var(--t); } .io-btn:hover { background: #F0F4FF; border-color: var(--navy); }
        #toasts { position: fixed; top: 80px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--white); border-radius: 10px; padding: 12px 16px; box-shadow: 0 8px 24px rgba(0,0,0,.2); display: flex; align-items: center; gap: 10px; font-size: 12.5px; font-weight: 500; min-width: 240px; max-width: 340px; border-left: 4px solid var(--ok); animation: tIn .3s ease; } .toast.err { border-left-color: var(--err); } .toast.wrn { border-left-color: var(--gold); } @keyframes tIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: none; } }
        .toast-ico { font-size: 16px; } .toast-msg { flex: 1; } .toast-x { width: 22px; height: 22px; border: none; background: none; cursor: pointer; color: var(--text-3); font-size: 13px; border-radius: 4px; }
        .pg-hdr { margin-bottom: 20px; } .pg-ttl { font-size: 1.5em; font-weight: 700; color: var(--navy); } .pg-sub { color: var(--text-2); }
        .gen-selector { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .gen-selector select { padding: 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; }
        .gen-no-sel { text-align: center; padding: 40px; color: var(--text-3); }
        .cred-frame { width: 240px; height: 380px; }
    </style>
</head>
<body>
<div id="app">
    <header id="hdr">
        <div class="hdr-logo" id="hdrLogo">C</div>
        <div class="hdr-info">
            <div class="hdr-title">Sistema de Credenciales Escolares</div>
            <div class="hdr-sub" id="hdrSub">Configura tu escuela en Configuración</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="fb-dot on" id="fbDot"></span>
            <div class="hdr-pill" id="hdrPill">v6.1 QR+ID</div>
        </div>
    </header>
    <nav id="sidebar">
        <div class="sb-section">
            <span class="sb-lbl">Principal</span>
            <div class="nav-item active" data-page="students">
                <div class="ni-icon">👥</div><span>Alumnos</span><span class="ni-badge" id="nbStudents">0</span>
            </div>
            <div class="nav-item" data-page="design"><div class="ni-icon">🎨</div><span>Diseño</span></div>
            <div class="nav-item" data-page="generate"><div class="ni-icon">🖨️</div><span>Generar</span></div>
        </div>
        <div class="sb-section">
            <span class="sb-lbl">Sistema</span>
            <div class="nav-item" data-page="config"><div class="ni-icon">⚙️</div><span>Configuración</span></div>
        </div>
        <div class="sb-footer"><div class="sb-ver">Credenciales Escolares © 2025 - v6.1</div></div>
    </nav>
    <main id="main">
        <section class="page active" id="page-students">
            <div class="pg-hdr"><div><div class="pg-ttl">Alumnos</div><div class="pg-sub">Administra el listado de alumnos (IDs: 2024001-2024600)</div></div><button class="btn btn-navy" onclick="openModal()">➕ Agregar Alumno</button></div>
            <div class="stats-row" id="statsRow"></div><div id="studentsTable"></div>
        </section>
        <section class="page" id="page-design"><div id="designPage"></div></section>
        <section class="page" id="page-generate"><div id="generatePage"></div></section>
        <section class="page" id="page-config"><div id="configPage"></div></section>
    </main>
</div>
<div class="m-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <div class="m-hdr"><span id="modalTitle">Nuevo Alumno</span><button class="m-close" onclick="closeModal()">✕</button></div>
        <div class="m-body">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px 18px;">
                <div style="grid-column:1/-1"><label>Nombre completo <span style="color:var(--err)">*</span></label><input type="text" id="f-nombre"></div>
                <div><label>Grado</label><input type="text" id="f-grado"></div><div><label>Grupo</label><input type="text" id="f-grupo"></div>
                <div><label>Turno</label><select id="f-turno"><option>Matutino</option><option>Mixto</option></select></div><div><label>Vigencia</label><input type="text" id="f-vigencia"></div>
                <div style="grid-column:1/-1"><label>Domicilio</label><textarea id="f-domicilio" rows="2"></textarea></div>
                <div><label>Tutor</label><input type="text" id="f-tutor"></div><div><label>Teléfono</label><input type="tel" id="f-telefono"></div>
                <div><label>Sangre</label><select id="f-sangre"><option>O+</option><option>O-</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option></select></div>
                <div><label>Alergias</label><input type="text" id="f-alergias"></div>
            </div>
        </div>
        <div class="m-footer"><button class="btn btn-out" onclick="closeModal()">Cancelar</button><button class="btn btn-navy" onclick="saveStudent()">💾 Guardar</button></div>
    </div>
</div>
<div id="toasts"></div>
<input type="file" id="logoInput" accept="image/*" style="display:none" onchange="handleLogoFile(this)">
<input type="file" id="bgInput" accept="image/*" style="display:none" onchange="handleBgFile(this)">
<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImportFile(this)">

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWzg0Tx6oZYwlUUYHZjEcS5k4r5iwoNC4",
    authDomain: "control-escolar-21.firebaseapp.com",
    databaseURL: "https://control-escolar-21-default-rtdb.firebaseio.com",
    projectId: "control-escolar-21",
    storageBucket: "control-escolar-21.firebasestorage.app",
    messagingSenderId: "404976060100",
    appId: "1:404976060100:web:a83479f80934239780ab91"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let firebaseOnline = false;
db.ref('.info/connected').on('value', snap => {
    firebaseOnline = snap.val() === true;
    document.getElementById('fbDot').className = 'fb-dot ' + (firebaseOnline ? 'on' : 'off');
});

const N = '#0B2D6B', G = '#C4922A';
const S = {
    students: [],
    config: { nombre:'', direccion:'', clave:'', ciclo:'', director:'', cargo:'Director(a)' },
    logo:'', bgImage:'',
    designStyles: {
        schoolName: { fontFamily:'Arial', fontSize:16, color:N, align:'center', bold:true },
        infoLine: { fontFamily:'Arial', fontSize:9, color:'#475569', align:'center' },
        studentName: { fontFamily:'Arial', fontSize:12, color:N, align:'center', bold:true },
        dataLabel: { fontFamily:'Arial', fontSize:7, color:'#64748b', align:'left', bold:true },
        dataValue: { fontFamily:'Arial', fontSize:10, color:N, align:'left', bold:true },
        backTitle: { fontFamily:'Arial', fontSize:9, color:'#fff', align:'center', bold:true },
        backField: { fontFamily:'Arial', fontSize:8, color:'#1e293b', align:'left' },
        directorName: { fontFamily:'Arial', fontSize:10, color:N, align:'center', bold:true },
        directorInfo: { fontFamily:'Arial', fontSize:8, color:'#475569', align:'center' },
        directorAddr: { fontFamily:'Arial', fontSize:7, color:'#64748b', align:'center' },
        margins: { front:{top:0,bottom:0,left:0,right:0}, back:{top:0,bottom:0,left:0,right:0} },
        bgOpacity:35, bgFit:'cover'
    },
    editId:null, editingElement:'schoolName', marginSide:'front', activeTab:'logobg'
};

function load(){
    db.ref('alumnos').once('value').then(snap => {
        const data = snap.val();
        if (data) S.students = Object.values(data);
        else { try { S.students = JSON.parse(localStorage.getItem('cred_st')||'[]'); } catch(e) {} }
        if (S.students.length === 0) S.students = [];
        renderStudents();
    });
    db.ref('configuracion/credenciales').once('value').then(snap => {
        const data = snap.val();
        if (data && data.nombre) S.config = data;
        else { try { const c = JSON.parse(localStorage.getItem('cred_cfg')); if(c) S.config = c; } catch(e) {} }
        updateHeader();
    });
    db.ref('configuracion/credenciales/logo').once('value').then(snap => { if(snap.val()) S.logo = snap.val(); else try { S.logo = localStorage.getItem('cred_logo')||''; } catch(e) {} });
    db.ref('configuracion/credenciales/bgImage').once('value').then(snap => { if(snap.val()) S.bgImage = snap.val(); else try { S.bgImage = localStorage.getItem('cred_bg')||''; } catch(e) {} });
    db.ref('configuracion/credenciales/designStyles').once('value').then(snap => {
        if(snap.val()) S.designStyles = snap.val();
        else try { const ds = JSON.parse(localStorage.getItem('cred_ds')); if(ds) S.designStyles = ds; } catch(e) {}
        if (!S.designStyles.margins) S.designStyles.margins = { front:{top:0,bottom:0,left:0,right:0}, back:{top:0,bottom:0,left:0,right:0} };
    });
    db.ref('alumnos').on('value', snap => { const data = snap.val(); if (data) { S.students = Object.values(data); renderStudents(); } });
}

function saveSt(){ const obj = {}; S.students.forEach(s => obj[s.id] = s); db.ref('alumnos').set(obj); localStorage.setItem('cred_st', JSON.stringify(S.students)); }
function saveCfg(){ db.ref('configuracion/credenciales').set(S.config); localStorage.setItem('cred_cfg', JSON.stringify(S.config)); }
function saveDS(){ db.ref('configuracion/credenciales/designStyles').set(S.designStyles); localStorage.setItem('cred_ds', JSON.stringify(S.designStyles)); }

function nav(pg){
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===pg));
    document.querySelectorAll('.page').forEach(el=>el.classList.toggle('active',el.id==='page-'+pg));

function getFrame(w,h,hasBg){
    const barH=Math.round(h/20);
    return `${hasBg ? '' : `<rect width="${w}" height="${h}" fill="white"/>`}<rect x="1.5" y="1.5" width="${w-3}" height="${h-3}" fill="none" stroke="${N}" stroke-width="1.5" rx="6"/><rect x="0" y="${h-barH}" width="${w}" height="${barH}" fill="${N}" rx="0 0 6 6"/>`;
}

function credCard(st,cfg,logo,bg,w,h,side){
    const hasBg=!!bg, ds=S.designStyles;
    const m=(side==='front'?ds.margins.front:ds.margins.back)||{top:0,bottom:0,left:0,right:0};
    const op=ds.bgOpacity??35, fit=ds.bgFit||'cover';
    const sc=w/215, fs=n=>(n*sc).toFixed(1), cm=cm=>(cm*h)/8.56;
    const barH=Math.round(h/20), bp=6;
    let tp=bp+4 + m.top*sc;
    if(side==='back') tp += cm(0.5);
    const bpB=bp+barH+4 + m.bottom*sc;
    const lp=bp+10 + m.left*sc, rp=bp+10 + m.right*sc;
    const cw=w-lp-rp, ch=h-tp-bpB;
    const stl=s=>s?`font-family:${s.fontFamily||'Arial'};font-size:${fs(s.fontSize||12)}px;color:${s.color||N};text-align:${s.align||'left'};${s.bold?'font-weight:800;':''}`:'';
    const logoEl=logo?`<img src="${logo}" style="width:${fs(36)}px;height:${fs(36)}px;border-radius:50%;object-fit:contain;border:2px solid ${N};background:white;padding:2px">`:`<div style="width:${fs(36)}px;height:${fs(36)}px;border-radius:50%;background:${N};display:flex;align-items:center;justify-content:center;color:white;font-size:${fs(8)}px;font-weight:800">${(cfg.clave||'ESC').slice(0,3).toUpperCase()}</div>`;
    const bgTag=hasBg?`<img src="${bg}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:${fit};opacity:${op/100};z-index:0;border-radius:6px">`:'';
    const studentId = st?.matricula || st?.id || '—';
    const front=`
        <div style="display:flex;align-items:center;gap:${fs(6)}px;margin-bottom:${fs(4)}px;padding-bottom:${fs(3)}px;border-bottom:2px solid ${G};">
            ${logoEl}
            <div style="flex:1;text-align:center;"><div style="${stl(ds.schoolName)}">${escH(cfg.nombre)||'NOMBRE DE LA ESCUELA'}</div><div style="${stl(ds.infoLine)}">CCT: ${escH(cfg.clave)||'—'} | ${escH(cfg.ciclo)||'Ciclo Escolar'}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:${fs(8)}px;margin:${fs(4)}px 0;">
            <div style="width:${fs(80)}px;height:${fs(100)}px;border:3px solid ${N};background:#f1f5f9;display:flex;align-items:center;justify-content:center;border-radius:${fs(6)}px;flex-shrink:0;"><span style="font-size:${fs(36)}px;color:#cbd5e1;">👤</span></div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:${fs(3)}px;flex-shrink:0;">
                <div id="qr-${st?.id||'preview'}" style="width:${fs(60)}px;height:${fs(60)}px;border:2px solid ${N};border-radius:${fs(4)}px;display:flex;align-items:center;justify-content:center;background:white;"></div>
                <div style="font-size:${fs(6)}px;font-weight:800;color:${N};text-align:center;background:${G}20;padding:${fs(2)}px ${fs(5)}px;border-radius:${fs(2)}px;">ID: ${studentId}</div>
            </div>
        </div>
        <div style="${stl(ds.studentName)} margin:${fs(4)}px 0;text-align:center;">${escH(st?.nombre||'Nombre del Alumno')}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:${fs(3)}px;margin-top:${fs(3)}px;padding-top:${fs(3)}px;border-top:1.5px solid #e2e8f0;">
            ${[['GRADO',st?.grado?st.grado+'°':'—'],['GRUPO',st?.grupo||'—'],['TURNO',st?.turno||'—'],['VIGENCIA',st?.vigencia||'—']].map(([l,v])=>`<div style="border-left:3px solid ${N};padding:${fs(2)}px ${fs(4)}px;"><div style="${stl(ds.dataLabel)} text-transform:uppercase;">${l}</div><div style="${stl(ds.dataValue)}">${v}</div></div>`).join('')}
        </div>
        <div style="margin-top:${fs(3)}px;text-align:center;font-size:${fs(5.5)}px;color:${N};"><strong>Responsable:</strong> ${escH(st?.tutor||'—')}</div>`;
    const back=`
        <div style="background:${N};color:white;text-align:center;font-weight:800;text-transform:uppercase;padding:${fs(5)}px;border-radius:${fs(4)}px;margin-bottom:${fs(8)}px;font-size:${fs(ds.backTitle.fontSize||9)}px;">Información de Contacto</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:${fs(6)}px;">
            <div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;margin-bottom:3px;font-weight:800;">Domicilio</div><div style="${stl(ds.backField)}">${escH(st?.domicilio)||'—'}</div></div>
            <div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;margin-bottom:3px;font-weight:800;">Tutor</div><div style="${stl(ds.backField)}">${escH(st?.tutor)||'—'}</div></div>
            <div style="display:grid;grid-template-columns:1.1fr .9fr;gap:${fs(8)}px;">
                <div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;margin-bottom:3px;font-weight:800;">Teléfono</div><div style="${stl(ds.backField)}">${escH(st?.telefono)||'—'}</div></div>
                <div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;margin-bottom:3px;font-weight:800;">Sangre</div><div style="font-size:${fs(12)}px;font-weight:900;color:#CC0000;">${escH(st?.tipoSangre)||'—'}</div></div>
            </div>
            <div><div style="${stl(ds.backField)} border-bottom:1px solid ${G};padding-bottom:2px;margin-bottom:3px;font-weight:800;">Alergias</div><div style="${stl(ds.backField)}">${escH(st?.alergias)||'Ninguna'}</div></div>
        </div>
        <div style="border-top:2px solid ${G};padding-top:${fs(5)}px;text-align:center;">
            <div style="${stl(ds.directorName)}">${escH(cfg.director)||'Director'}</div><div style="${stl(ds.directorInfo)} margin:${fs(2)}px 0;">${escH(cfg.cargo)||'Director(a)'}</div><div style="${stl(ds.directorAddr)}">${escH(cfg.direccion)||'Dirección'}</div>
        </div>`;
    return `<div style="position:relative;width:${w}px;height:${h}px;border-radius:6px;overflow:hidden;">${bgTag}<svg width="${w}" height="${h}" style="position:absolute;top:0;left:0;z-index:1">${getFrame(w,h,hasBg)}</svg><div style="position:absolute;top:${tp}px;left:${lp}px;width:${cw}px;height:${ch}px;z-index:2;display:flex;flex-direction:column;">${side==='front'?front:back}</div></div>`;
}

function generateQRCodes(){
    setTimeout(() => {
        document.querySelectorAll('[id^="qr-"]').forEach(el => {
            if(el.hasChildNodes()) return;
            const idPart = el.id.replace('qr-','');
            let text = 'SIN_ID';
            if(idPart === 'preview') text = 'PREVIEW';
            else {
                const st = S.students.find(s => String(s.id) === idPart || String(s.matricula) === idPart);
                if(st) text = st.matricula || String(st.id);
            }
            try {
                new QRCode(el, { text: text, width: 60, height: 60, colorDark: '#0B2D6B', colorLight: '#ffffff' });
            } catch(e) { el.innerHTML = '<span style="font-size:8px;">QR</span>'; }
        });
    }, 400);
}

function saveStudent(){
    const n=document.getElementById('f-nombre').value.trim();
    if(!n){toast('Nombre obligatorio','err');return;}
    let newId;
    if(S.editId){newId=S.editId;}
    else {
        const existingIds=S.students.map(s=>s.id).filter(id=>typeof id==='number');
        const maxId=existingIds.length>0?Math.max(...existingIds):2024000;
        newId=maxId+1;
        if(newId>2024600)newId=2024001;
    }
    const data={id:newId,matricula:String(newId),nombre:n,grado:document.getElementById('f-grado').value.trim(),grupo:document.getElementById('f-grupo').value.trim().toUpperCase(),turno:document.getElementById('f-turno').value,vigencia:document.getElementById('f-vigencia').value.trim(),domicilio:document.getElementById('f-domicilio').value.trim(),tutor:document.getElementById('f-tutor').value.trim(),telefono:document.getElementById('f-telefono').value.trim(),tipoSangre:document.getElementById('f-sangre').value,alergias:document.getElementById('f-alergias').value.trim()};
    if(S.editId)S.students=S.students.map(s=>s.id===S.editId?{...s,...data}:s);
    else S.students.push(data);
    saveSt();closeModal();renderStudents();toast(`Alumno guardado con ID: ${newId}`);
}
function delStudent(id){const s=S.students.find(s=>s.id===id);if(!s||!confirm(`¿Eliminar a "${s.nombre}"?`))return;S.students=S.students.filter(s=>s.id!==id);saveSt();renderStudents();toast('Alumno eliminado','wrn');}

function removeBg(){S.bgImage='';db.ref('configuracion/credenciales/bgImage').remove();localStorage.removeItem('cred_bg');renderDesign();}

function renderGenerate(){
    const selId=window._genId||'', st=selId?S.students.find(s=>s.id===parseInt(selId)):null;
    document.getElementById('generatePage').innerHTML=`<div class="pg-hdr"><div><div class="pg-ttl">Generar Credencial</div></div></div><div class="gen-selector"><select onchange="window._genId=this.value;renderGenerate()"><option value="">— Seleccionar alumno —</option>${S.students.map(s=>`<option value="${s.id}">${escH(s.nombre)} — ${s.grado}° ${s.grupo} (ID:${s.matricula||s.id})</option>`).join('')}</select>${st?`<button class="btn btn-navy" onclick="printCredential(${st.id})">🖨️ Imprimir</button><button class="btn btn-out" onclick="printCredential(${st.id},'front')">Solo Frente</button><button class="btn btn-out" onclick="printCredential(${st.id},'back')">Solo Reverso</button>`:''}</div>${st?`<div class="cred-prev-wrap"><div><div class="cred-side-lbl">FRENTE</div><div class="cred-frame">${credCard(st,S.config,S.logo,S.bgImage,240,380,'front')}</div></div><div><div class="cred-side-lbl">REVERSO</div><div class="cred-frame">${credCard(st,S.config,S.logo,S.bgImage,240,380,'back')}</div></div></div>`:`<div class="gen-no-sel">Selecciona un alumno</div>`}`;
    generateQRCodes();
}

function printCredential(id,side){
    const s=S.students.find(s=>s.id===id);if(!s){toast('Alumno no encontrado','err');return;}
    const fw=285,fh=449;
    let html='';
    if(!side||side==='front')html+=`<div style="margin-bottom:20px;">${credCard(s,S.config,S.logo,S.bgImage,fw,fh,'front')}</div>`;
    if(!side||side==='back')html+=`<div>${credCard(s,S.config,S.logo,S.bgImage,fw,fh,'back')}</div>`;
    const w=window.open('','_blank','width=900,height=700');if(!w){toast('Permite ventanas emergentes','err');return;}
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Credencial</title><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script><style>body{font-family:Arial;background:#CBD5E1;padding:24px;display:flex;gap:24px;justify-content:center}@media print{body{background:white;padding:0}}</style></head><body>${html}<script>document.querySelectorAll('[id^="qr-"]').forEach(el=>{if(!el.hasChildNodes()){try{new QRCode(el,{text:el.id.replace('qr-',''),width:60,height:60,colorDark:'#0B2D6B',colorLight:'#ffffff'})}catch(e){}}});setTimeout(()=>window.print(),800);<\/script></body></html>`);
    w.document.close();
}

function escH(s){return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"');}
function toast(msg,type='ok'){const icons={ok:'✅',err:'❌',wrn:'⚠️'};const el=document.createElement('div');el.className=`toast ${type==='err'?'err':type==='wrn'?'wrn':''}`;el.innerHTML=`<span>${icons[type]}</span><span>${escH(msg)}</span><button onclick="this.parentElement.remove()">✕</button>`;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}
function updateHeader(){const el=document.getElementById('hdrLogo');if(S.logo){el.innerHTML=`<img src="${S.logo}">`;el.style.background='transparent';}else{el.innerHTML=(S.config.clave||'C').charAt(0).toUpperCase();el.style.background='var(--gold)';}document.getElementById('hdrSub').textContent=S.config.nombre||'Configura tu escuela';document.getElementById('hdrPill').textContent='v6.1 QR+ID';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
load();updateHeader();renderStudents();
console.log('✅ App Credenciales v6.1 - QR + ID automático');
console.log('🆔 IDs: 2024001 - 2024600 (600 alumnos)');
